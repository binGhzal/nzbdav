name: "Deploy Pre-Release Images"

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release') }}"

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate changelog
        if: github.event_name == 'push'
        run: |
          if ! git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx "CHANGELOG.md"; then
            echo "::error::Main pushes publish beta/latest images and must update CHANGELOG.md."
            exit 1
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Test backend
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build frontend server
        working-directory: frontend
        run: npm run build:server

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release') }}"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          GHCR_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "NZBDAV_VERSION=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          {
            echo "TAGS<<EOF"
            echo "${GHCR_REPO}:beta"
            echo "${GHCR_REPO}:latest"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}
