name: "Publish Personal GHCR Image"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NZBDAV_VERSION value"
        required: true
        default: "beta"
      publish_latest:
        description: "Also publish the latest tag"
        type: boolean
        required: true
        default: true
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Scan NuGet vulnerabilities
        run: dotnet list backend.Tests/backend.Tests.csproj package --vulnerable --include-transitive

      - name: Test backend
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Scan npm vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build frontend server
        working-directory: frontend
        run: npm run build:server

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Smoke test frontend server
        working-directory: frontend
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -t nzbdav:ci .

      - name: Test migration failure exits nonzero
        run: |
          set +e
          docker run --rm \
            -e CONFIG_PATH=/dev/null \
            -e FRONTEND_BACKEND_API_KEY=ci-entrypoint-test \
            nzbdav:ci >/tmp/nzbdav-entrypoint.log 2>&1
          rc=$?
          set -e
          cat /tmp/nzbdav-entrypoint.log
          if [ "$rc" -eq 0 ]; then
            echo "::error::Container exited successfully after a forced migration failure."
            exit 1
          fi

      - name: Check whitespace
        run: git diff --check

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          GHCR_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "NZBDAV_VERSION=${VERSION}" >> $GITHUB_OUTPUT
          {
            echo "TAGS<<EOF"
            echo "${GHCR_REPO}:beta"
            echo "${GHCR_REPO}:sha-${GITHUB_SHA}"
            if [ "${{ github.event.inputs.publish_latest }}" != "false" ]; then
              echo "${GHCR_REPO}:latest"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}
