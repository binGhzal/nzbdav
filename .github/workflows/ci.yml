name: "CI"

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nzbdav
          POSTGRES_USER: nzbdav
          POSTGRES_PASSWORD: nzbdav
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nzbdav -d nzbdav"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Scan NuGet vulnerabilities
        run: dotnet list backend.Tests/backend.Tests.csproj package --vulnerable --include-transitive

      - name: Test backend
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-restore

      - name: Smoke test PostgreSQL migrations
        env:
          NZBDAV_DATABASE_PROVIDER: postgres
          NZBDAV_DATABASE_CONNECTION_STRING: Host=localhost;Port=55432;Database=nzbdav;Username=nzbdav;Password=nzbdav
          FRONTEND_BACKEND_API_KEY: ci-postgres-test
        run: dotnet run --project backend/NzbWebDAV.csproj --configuration Release -- --db-migration

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Scan npm vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build frontend server
        working-directory: frontend
        run: npm run build:server

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Smoke test frontend server
        working-directory: frontend
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build -t nzbdav:ci .

      - name: Test migration failure exits nonzero
        run: |
          set +e
          docker run --rm \
            -e CONFIG_PATH=/dev/null \
            -e FRONTEND_BACKEND_API_KEY=ci-entrypoint-test \
            nzbdav:ci >/tmp/nzbdav-entrypoint.log 2>&1
          rc=$?
          set -e
          cat /tmp/nzbdav-entrypoint.log
          if [ "$rc" -eq 0 ]; then
            echo "::error::Container exited successfully after a forced migration failure."
            exit 1
          fi

      - name: Check whitespace
        run: git diff --check
